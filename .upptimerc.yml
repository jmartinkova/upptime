# Change these first
owner: jmartinkova
repo: upptime

sites:
  - name: "DSW Cloud for ELIXIR (homepage)"
    url: https://dsw.elixir-europe.org

  - name: "DSW Researchers instance"
    url: https://researchers.dsw.elixir-europe.org

status-website:
  baseUrl: /upptime

  logoUrl: https://jmartinkova.github.io/upptime/dsw-icon.svg

  name: "DSW Cloud for ELIXIR | Status"

  introTitle: "Status page for [**dsw.elixir-europe.org**](https://dsw.elixir-europe.org) services."

  introMessage: "This status page monitors the availability of the DSW Cloud for ELIXIR services."

  themeUrl: https://jmartinkova.github.io/upptime/custom-theme.css

  navbar:
    - title: Status
      href: /upptime

    - title: Homepage
      href: https://dsw.elixir-europe.org

  js: |
    function hidePastIncidents() {
      const path = window.location.pathname.replace(/\/$/, "");

      if (path !== "/status") {
        return;
      }

      document.querySelectorAll("section").forEach(function (section) {
        const heading = section.querySelector("h2");

        if (heading && heading.textContent.trim() === "Past Incidents") {
          section.style.display = "none";
        }
      });
    }

    window.addEventListener("load", hidePastIncidents);

    setTimeout(hidePastIncidents, 500);
    setTimeout(hidePastIncidents, 1500);

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/15 * * * *"