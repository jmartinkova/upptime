# Change these first
owner: jmartinkova
repo: upptime

sites:
  - name: DMP.eosc.cz
    url: https://dmp.eosc.cz
    icon: https://dmp.eosc.cz/static/icons/favicon.svg
  - name: DMP.eosc.cz/wizard
    url: https://dmp.eosc.cz/wizard/
    icon: https://dmp.eosc.cz/wizard/img/favicon/favicon.ico

status-website:
  baseUrl: /upptime
  logoUrl: https://jmartinkova.github.io/upptime/dsw-icon.svg
  name: "DMP in Czech NRP | Status"
  introTitle: "Status page for [**dmp.eosc.cz**](https://dmp.eosc.cz) services."
  introMessage: "This is status page monitors the availability of the DMP in National Repository Platform for Research Data (in Czech Republic) and related services. It also contains important information in case of outages, scheduled maintenance, and other incidents."
  themeUrl: https://jmartinkova.github.io/upptime/custom-theme.css

  navbar:
    - title: Status
      href: /upptime

    - title: Homepage
      href: https://dmp.eosc.cz

  js: |
    function hidePastIncidents() {
      const path = window.location.pathname.replace(/\/$/, "");

      if (path !== "/upptime") {
        return;
      }

      document.querySelectorAll("section").forEach(function (section) {
        const heading = section.querySelector("h2");

        if (heading && heading.textContent.trim() === "Past Incidents") {
          section.style.display = "none";
        }
      });
    }

    window.addEventListener("load", hidePastIncidents);

    setTimeout(hidePastIncidents, 500);
    setTimeout(hidePastIncidents, 1500);

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/15 * * * *"